<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dog API Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            width: 280px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .card button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .card button:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>oto cachorro</h2>
        <img id="dogImage" src="" alt="Cachorro">
        <button onclick="carregarCachorro()">Carregar outro</button>
    </div>

    <script>
        // Possibilita a simultaneadade d função do botão, ou seja, posso clicar várias vezes
        async function carregarCachorro() {
            try {
                // A API requisita dados para o banco
                const response = await fetch("https://dog.ceo/api/breeds/image/random");
                // Espera a resposta do .JSON (banco de dados)
                const data = await response.json();
                // Muda o elemento dogImage pelo SOURCE do .JSON (data.MESSAGE)
                document.getElementById("dogImage").src = data.message;
            } catch (error) {
                // Mostra o erro caso o fetch falhe.
                console.error("Erro ao carregar imagem:", error);
            }
        }

        // Carrega uma imagem ao abrir
        carregarCachorro();
    </script>

</body>

</html>
