<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Feriados Brasil 2024</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
        }

        .card {
            width: 500px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        table {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="card p-4 bg-white">
        <h2 class="text-center mb-3">📅 Feriados 2024</h2>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Feriado</th>
                </tr>
            </thead>

            <!-- IMPORTANTE: começa vazio -->
            <tbody id="tabelaFeriados"></tbody>
        </table>
    </div>

    <script>
        // Permite simultaneadade na função de carregar feriados
        async function carregarFeriados() {
            try {
                // Busca os dados no banco
                const response = await fetch("https://brasilapi.com.br/api/feriados/v1/2024");
                // Espera a resposta do banco
                const feriados = await response.json();
                // Mostra a resposta, os feriados, numa tabela pela classe tabelaFeriados
                const tbody = document.getElementById("tabelaFeriados");

                // Percorre todos os feriados
                feriados.forEach(feriado => {
                    // Cria uma linha (table row) para cada feriado
                    const tr = document.createElement("tr");
                    // Cria uma td (table data) para o conteúdo puxado (Data e Nome) ser colocado na table
                    const tdData = document.createElement("td");
                    const tdNome = document.createElement("td");
                    // Agora que as variáveis estavam sendo criadas, está na hora de colocar elas na tabela.
                    // Coloca a data do feriado (feriado.date) na tdData (td) em forma de texto (textContent)
                    tdData.textContent = feriado.date;
                    // Coloca o nome do feriado (feriado.name) na tdData (td) em forma de texto (textContent)
                    tdNome.textContent = feriado.name;
                    // Coloca (append) o conteúdo (tdData/tdNome) dentro da linha (tr)
                    tr.appendChild(tdData);
                    tr.appendChild(tdNome);
                    // Coloca a linha (tr) dentro da tbody
                    tbody.appendChild(tr);
                });

            } catch (erro) {
                // Mostra o erro caso falhe
                console.error("Erro ao carregar feriados:", erro);
            }
        }

        // Executa ao carregar a página
        carregarFeriados();
    </script>

</body>

</html>
